<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suite de Armonía Avanzada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #020408;
            color: white;
        }

        /* Contenedor del menú con Grid Flexible */
        #nav-bar {
            background: #0f172a;
            border-bottom: 1px solid #1e293b;
            padding: 12px;
            gap: 8px;
            display: grid;
            /* Móvil por defecto: columnas automáticas de mínimo 140px */
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            z-index: 100;
            flex-shrink: 0; /* Evita que el nav se colapse */
        }

        /* Escritorio: Forzamos las 8 columnas si hay espacio suficiente */
        @media (min-width: 1024px) {
            #nav-bar {
                grid-template-columns: repeat(8, 1fr);
            }
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 4px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .nav-link {
            font-family: ui-sans-serif, system-ui, sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-decoration: none;
            padding: 8px 4px;
            border-radius: 4px;
            transition: all 0.2s;
            text-align: center;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .nav-link:hover {
            color: #f1f5f9;
            background: #1e293b;
            border-color: #334155;
        }

        .nav-link.active {
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
            border-color: rgba(56, 189, 248, 0.4);
        }

        /* El Iframe ahora ocupa todo el espacio restante automáticamente */
        #content-frame {
            flex-grow: 1;
            width: 100%;
            border: none;
            background: white; /* Opcional: fondo blanco para el contenido del app */
        }
    </style>
</head>

<body>

    <nav id="nav-bar">
        <!-- Logo/Título -->
        <div class="logo-container text-[10px] font-black text-sky-500 py-2">
            HARMONY SUITE
        </div>

        <!-- Enlaces -->
        <a href="#" class="nav-link active" onclick="loadApp('visualizador_Mayores_menores_setimas.html', this)">Círculo 00</a>
        <a href="#" class="nav-link" onclick="loadApp('visualizador_acordes002.html', this)">Acordes 002</a>
        <a href="#" class="nav-link" onclick="loadApp('visualizador_cadencias0001.html', this)">Cadencias 001</a>
        <a href="#" class="nav-link" onclick="loadApp('visualizador_cadencias0002.html', this)">Cadencias 002</a>
        <a href="#" class="nav-link" onclick="loadApp('visualizador_circulo_quintas01.html', this)">Círculo 01</a>
        <a href="#" class="nav-link" onclick="loadApp('visualizador_circulo_quintas02.html', this)">Círculo 02</a>
        <a href="#" class="nav-link" onclick="loadApp('visualizador_acordes001.html', this)">Acordes 001</a>
        <a href="#" class="nav-link" onclick="loadApp('visualizar_bIII7_bVI_bII_I.html', this)">Modulación bIII7</a>
        <a href="#" class="nav-link" onclick="loadApp('tonnez_v1.html', this)">Tonnez V1</a>
        <a href="#" class="nav-link" onclick="loadApp('escribir_acordes_a_mano.html', this)">Escribir Acordes</a>
        <a href="#" class="nav-link" onclick="loadApp('visualizador_de_adsr.html', this)">ADSR Visual</a>
        <a href="#" class="nav-link" onclick="loadApp('Calculadora_de_Tiempo_Musical.html', this)">Calculadora Tiempos</a>
        <a href="#" class="nav-link" onclick="loadApp('desarrollo_motivico.html', this)">Motívico</a>
        <a href="#" class="nav-link" onclick="loadApp('reproducir_partituraABC.html', this)">Notación ABC</a>
    </nav>

    <iframe id="content-frame" src="visualizador_Mayores_menores_setimas.html"></iframe>

    <script>
        function loadApp(url, element) {
            const iframe = document.getElementById('content-frame');
            
            // Efecto de carga suave
            iframe.style.opacity = '0.5';
            iframe.src = url;
            
            iframe.onload = () => {
                iframe.style.opacity = '1';
            };

            // Actualizar estados visuales de los links
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
            });
            element.classList.add('active');

            // Evitar recarga de página
            if (event) event.preventDefault();
        }
    </script>

</body>

</html>
