<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suite de Armonía Avanzada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #020408;
            color: white;
            font-family: ui-sans-serif, system-ui, sans-serif;
        }

        /* Contenedor del menú */
        #nav-bar {
            background: #0f172a;
            border-bottom: 1px solid #1e293b;
            padding: 12px;
            gap: 8px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            z-index: 100;
            flex-shrink: 0;
            /* Transición de opacidad para suavidad */
            transition: opacity 0.2s ease-in-out;
        }

        /* Clase para ocultar el menú totalmente del flujo */
        #nav-bar.hidden-nav {
            display: none;
        }

        @media (min-width: 1024px) {
            #nav-bar {
                grid-template-columns: repeat(8, 1fr);
            }
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 4px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .nav-link {
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-decoration: none;
            padding: 8px 4px;
            border-radius: 4px;
            transition: all 0.2s;
            text-align: center;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .nav-link:hover {
            color: #f1f5f9;
            background: #1e293b;
            border-color: #334155;
        }

        .nav-link.active {
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
            border-color: rgba(56, 189, 248, 0.4);
        }

        /* Botón Flotante corregido */
        #toggle-nav {
            position: fixed;
            bottom: 20px; /* Movido abajo a la derecha para no estorbar títulos */
            right: 20px;
            z-index: 1000;
            background: #38bdf8;
            color: #020408;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: bold;
        }

        #toggle-nav:hover {
            transform: scale(1.1);
            background: #7dd3fc;
        }

        /* Si el menú está oculto, el botón puede ser más discreto o cambiar de color */
        #toggle-nav.is-hidden {
            background: rgba(15, 23, 42, 0.8);
            color: #38bdf8;
            border: 1px solid #38bdf8;
        }

        /* El Iframe ahora siempre ocupa el espacio restante real */
        #content-frame {
            flex-grow: 1;
            width: 100%;
            border: none;
            background: #ffffff;
        }
    </style>
</head>

<body>

    <!-- Botón de control (Movido a la esquina inferior derecha) -->
    <button id="toggle-nav" title="Mostrar/Ocultar Menú" onclick="toggleMenu()">
        <svg id="icon-menu" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>

    <nav id="nav-bar">
        <div class="logo-container text-[10px] font-black text-sky-500 py-2">
            HARMONY SUITE
        </div>

        <a href="#" class="nav-link active" onclick="loadApp('visualizador_Mayores_menores_setimas.html', this)">Círculo 00</a>
        <a href="#" class="nav-link" onclick="loadApp('visualizador_acordes002.html', this)">Acordes 002</a>
        <a href="#" class="nav-link" onclick="loadApp('visualizador_cadencias0001.html', this)">Cadencias 001</a>
        <a href="#" class="nav-link" onclick="loadApp('visualizador_cadencias0002.html', this)">Cadencias 002</a>
        <a href="#" class="nav-link" onclick="loadApp('visualizador_circulo_quintas01.html', this)">Círculo 01</a>
        <a href="#" class="nav-link" onclick="loadApp('visualizador_circulo_quintas02.html', this)">Círculo 02</a>
        <a href="#" class="nav-link" onclick="loadApp('visualizador_acordes001.html', this)">Acordes 001</a>
        <a href="#" class="nav-link" onclick="loadApp('visualizar_bIII7_bVI_bII_I.html', this)">bIII7_bVI_bII_I</a>
        <a href="#" class="nav-link" onclick="loadApp('tonnez_v1.html', this)">Tonnez V1</a>
        <a href="#" class="nav-link" onclick="loadApp('escribir_acordes_a_mano.html', this)">Escribir Acordes</a>
        <a href="#" class="nav-link" onclick="loadApp('visualizador_de_adsr.html', this)">ADSR Visual</a>
        <a href="#" class="nav-link" onclick="loadApp('Calculadora_de_Tiempo_Musical.html', this)">Calculadora Tiempos</a>
        <a href="#" class="nav-link" onclick="loadApp('desarrollo_motivico.html', this)">Motívico</a>
        <a href="#" class="nav-link" onclick="loadApp('reproducir_partituraABC.html', this)">Notación ABC</a>
    </nav>

    <iframe id="content-frame" src="visualizador_Mayores_menores_setimas.html"></iframe>

    <script>
        function toggleMenu() {
            const nav = document.getElementById('nav-bar');
            const btn = document.getElementById('toggle-nav');
            
            nav.classList.toggle('hidden-nav');
            btn.classList.toggle('is-hidden');
        }

        function loadApp(url, element) {
            const iframe = document.getElementById('content-frame');
            iframe.style.opacity = '0.5';
            iframe.src = url;
            
            iframe.onload = () => {
                iframe.style.opacity = '1';
            };

            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
            });
            element.classList.add('active');

            // En móvil, quizás quieras que el menú se cierre solo al elegir una app
            if (window.innerWidth < 768) {
                toggleMenu();
            }

            if (event) event.preventDefault();
        }
    </script>

</body>

</html>
