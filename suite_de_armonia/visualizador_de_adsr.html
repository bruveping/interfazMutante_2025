<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintetizador ADSR Avanzado con Visualización</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-color: #16213e;
            --accent-color: #4ecca3;
            --text-color: #e9ecef;
            --input-bg: #0f3460;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--panel-color);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1, h2, h3 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
        }

        .display-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .canvas-container {
            background: #000;
            border-radius: 8px;
            border: 1px solid var(--accent-color);
            position: relative;
            height: 150px;
        }

        .canvas-label {
            position: absolute;
            top: 5px;
            left: 10px;
            font-size: 0.7rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group {
            margin-bottom: 12px;
        }

        .control-group label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: #aaa;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: var(--accent-color);
        }

        .value-display {
            min-width: 35px;
            font-family: monospace;
            color: var(--accent-color);
            text-align: right;
            font-size: 0.85rem;
        }

        .dexed-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            text-align: center;
        }

        .dexed-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dexed-cell input {
            writing-mode: bt-lr;
            appearance: slider-vertical;
            width: 20px;
            height: 100px;
            margin: 10px 0;
        }

        .dexed-cell label {
            font-size: 0.75rem;
            color: #4ecca3;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.1s, background 0.2s;
        }

        .btn-main:active {
            transform: scale(0.98);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Synth ADSR Explorer</h1>

    <div class="display-section">
        <div class="canvas-container">
            <span class="canvas-label">Onda en tiempo real</span>
            <canvas id="visualizer"></canvas>
        </div>
        <div class="canvas-container">
            <span class="canvas-label">Gráfico de Envolvente (Preview)</span>
            <canvas id="envVisualizer"></canvas>
        </div>
    </div>

    <div class="controls-grid">
        <!-- Master & Filter -->
        <div class="panel">
            <h3>Master & Filter</h3>
            <div class="control-group">
                <label>Volumen General</label>
                <div class="slider-row">
                    <input type="range" id="masterGain" min="0" max="100" value="70">
                    <span class="value-display" id="val-masterGain">70</span>
                </div>
            </div>

            <div class="control-group">
                <label>Filtro Cutoff (Hz)</label>
                <div class="slider-row">
                    <input type="range" id="filterCutoff" min="20" max="10000" value="2000">
                    <span class="value-display" id="val-filterCutoff">2000</span>
                </div>
            </div>

            <div class="control-group">
                <label>Resonancia (Q)</label>
                <div class="slider-row">
                    <input type="range" id="filterRes" min="0.1" max="20" step="0.1" value="1">
                    <span class="value-display" id="val-filterRes">1.0</span>
                </div>
            </div>

            <hr style="opacity: 0.1; margin: 15px 0;">
            <h3>Filtro ADSR</h3>
            <div class="dexed-grid">
                <div class="dexed-cell"><label>A</label><input type="range" id="fA" min="0" max="99" value="20"></div>
                <div class="dexed-cell"><label>D</label><input type="range" id="fD" min="0" max="99" value="40"></div>
                <div class="dexed-cell"><label>S</label><input type="range" id="fS" min="0" max="99" value="30"></div>
                <div class="dexed-cell"><label>R</label><input type="range" id="fR" min="0" max="99" value="20"></div>
            </div>
        </div>

        <!-- Envelope Panel -->
        <div class="panel">
            <div class="tabs">
                <button class="tab-btn active" id="btn-normal" onclick="switchEnvelope('normal')">ADSR Normal</button>
                <button class="tab-btn" id="btn-dexed" onclick="switchEnvelope('dexed')">ADSR Dexed (DX7)</button>
            </div>

            <!-- Normal ADSR -->
            <div id="env-normal">
                <h3>Amp ADSR</h3>
                <div class="control-group">
                    <label>Attack (R1)</label>
                    <div class="slider-row">
                        <input type="range" id="nA" class="env-param" min="0" max="99" value="20">
                        <span class="value-display">20</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Decay (R2)</label>
                    <div class="slider-row">
                        <input type="range" id="nD" class="env-param" min="0" max="99" value="40">
                        <span class="value-display">40</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Sustain (L3)</label>
                    <div class="slider-row">
                        <input type="range" id="nS" class="env-param" min="0" max="99" value="60">
                        <span class="value-display">60</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Release (R4)</label>
                    <div class="slider-row">
                        <input type="range" id="nR" class="env-param" min="0" max="99" value="30">
                        <span class="value-display">30</span>
                    </div>
                </div>
            </div>

            <!-- Dexed Envelope -->
            <div id="env-dexed" class="hidden">
                <h3>Dexed Multi-Level</h3>
                <div class="dexed-grid">
                    <div class="dexed-cell">
                        <label>L1</label>
                        <input type="range" id="dL1" class="env-param" min="0" max="99" value="99">
                        <span class="value-display">99</span>
                    </div>
                    <div class="dexed-cell">
                        <label>L2</label>
                        <input type="range" id="dL2" class="env-param" min="0" max="99" value="70">
                        <span class="value-display">70</span>
                    </div>
                    <div class="dexed-cell">
                        <label>L3</label>
                        <input type="range" id="dL3" class="env-param" min="0" max="99" value="50">
                        <span class="value-display">50</span>
                    </div>
                    <div class="dexed-cell">
                        <label>L4</label>
                        <input type="range" id="dL4" class="env-param" min="0" max="99" value="0">
                        <span class="value-display">0</span>
                    </div>
                    
                    <div class="dexed-cell">
                        <label>R1</label>
                        <input type="range" id="dR1" class="env-param" min="0" max="99" value="70">
                        <span class="value-display">70</span>
                    </div>
                    <div class="dexed-cell">
                        <label>R2</label>
                        <input type="range" id="dR2" class="env-param" min="0" max="99" value="40">
                        <span class="value-display">40</span>
                    </div>
                    <div class="dexed-cell">
                        <label>R3</label>
                        <input type="range" id="dR3" class="env-param" min="0" max="99" value="20">
                        <span class="value-display">20</span>
                    </div>
                    <div class="dexed-cell">
                        <label>R4</label>
                        <input type="range" id="dR4" class="env-param" min="0" max="99" value="50">
                        <span class="value-display">50</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button id="playBtn" class="btn-main">TOCAR ACORDE (C3+C4+G4)</button>
    <p style="font-size: 0.8rem; color: #888; text-align: center;">Mueve los sliders para ver el cambio gráfico de la envolvente.</p>
</div>

<script>
    let audioCtx = null;
    let masterGainNode = null;
    let analyzer = null;
    let filterNode = null;
    let activeOscs = [];
    let envType = 'normal';

    const frequencies = [130.81, 261.63, 392.00];

    function rateToTime(rate) {
        rate = parseFloat(rate);
        if (rate >= 99) return 0.001;
        return Math.pow(10, ((99 - rate) / 33) - 1.5);
    }

    function levelToGain(lvl) {
        return parseFloat(lvl) / 99;
    }

    /**
     * Initializes AudioContext safely
     */
    function initAudio() {
        if (!audioCtx) {
            try {
                // Use standard or prefixed AudioContext
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) {
                    console.error("No AudioContext found");
                    return;
                }
                
                audioCtx = new AudioContextClass();
                masterGainNode = audioCtx.createGain();
                filterNode = audioCtx.createBiquadFilter();
                filterNode.type = 'lowpass';
                
                // Safe creation of analyzer
                if (typeof audioCtx.createAnalyzer === 'function') {
                    analyzer = audioCtx.createAnalyzer();
                    analyzer.fftSize = 1024;
                } else {
                    console.warn("Analyzer not supported");
                }

                masterGainNode.connect(filterNode);
                
                if (analyzer) {
                    filterNode.connect(analyzer);
                    analyzer.connect(audioCtx.destination);
                    drawOscilloscope();
                } else {
                    filterNode.connect(audioCtx.destination);
                }
            } catch (e) {
                console.error("Error initializing audio context:", e);
            }
        }
        
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function triggerNote() {
        initAudio();
        if (!audioCtx) return;
        
        stopNote(true);

        const now = audioCtx.currentTime;
        const masterVol = levelToGain(document.getElementById('masterGain').value);
        masterGainNode.gain.setTargetAtTime(masterVol, now, 0.02);

        const cutoff = parseFloat(document.getElementById('filterCutoff').value);
        const res = parseFloat(document.getElementById('filterRes').value);
        filterNode.frequency.setValueAtTime(cutoff, now);
        filterNode.Q.setValueAtTime(res, now);

        const fA = rateToTime(document.getElementById('fA').value);
        const fD = rateToTime(document.getElementById('fD').value);
        const fS = levelToGain(document.getElementById('fS').value);
        filterNode.frequency.exponentialRampToValueAtTime(Math.min(20000, cutoff * 5), now + fA);
        filterNode.frequency.exponentialRampToValueAtTime(Math.max(20, cutoff * fS + 0.1), now + fA + fD);

        frequencies.forEach(f => {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(f, now);
            g.gain.setValueAtTime(0, now);

            if (envType === 'normal') {
                const a = rateToTime(document.getElementById('nA').value);
                const d = rateToTime(document.getElementById('nD').value);
                const s = levelToGain(document.getElementById('nS').value);
                g.gain.linearRampToValueAtTime(0.3, now + a);
                g.gain.linearRampToValueAtTime(0.3 * s, now + a + d);
            } else {
                const r1 = rateToTime(document.getElementById('dR1').value);
                const r2 = rateToTime(document.getElementById('dR2').value);
                const r3 = rateToTime(document.getElementById('dR3').value);
                const l1 = levelToGain(document.getElementById('dL1').value) * 0.3;
                const l2 = levelToGain(document.getElementById('dL2').value) * 0.3;
                const l3 = levelToGain(document.getElementById('dL3').value) * 0.3;

                g.gain.linearRampToValueAtTime(l1, now + r1);
                g.gain.linearRampToValueAtTime(l2, now + r1 + r2);
                g.gain.linearRampToValueAtTime(l3, now + r1 + r2 + r3);
            }

            osc.connect(g);
            g.connect(masterGainNode);
            osc.start();
            activeOscs.push({ osc, g });
        });
    }

    function stopNote(immediate = false) {
        if (!audioCtx || activeOscs.length === 0) return;
        const now = audioCtx.currentTime;

        activeOscs.forEach(voice => {
            const currentG = voice.g.gain.value;
            voice.g.gain.cancelScheduledValues(now);
            voice.g.gain.setValueAtTime(currentG, now);

            if (immediate) {
                try { voice.osc.stop(); } catch(e) {}
            } else {
                let rTime, targetL;
                if (envType === 'normal') {
                    rTime = rateToTime(document.getElementById('nR').value);
                    targetL = 0;
                } else {
                    rTime = rateToTime(document.getElementById('dR4').value);
                    targetL = levelToGain(document.getElementById('dL4').value) * 0.3;
                }
                voice.g.gain.linearRampToValueAtTime(targetL, now + rTime);
                if (targetL > 0) voice.g.gain.linearRampToValueAtTime(0, now + rTime + 0.05);
                
                setTimeout(() => {
                    try { voice.osc.stop(); } catch(e) {}
                }, (rTime + 0.1) * 1000);
            }
        });

        if (!immediate) activeOscs = [];
    }

    function drawEnvelopePreview() {
        const canvas = document.getElementById('envVisualizer');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width;
        const h = canvas.height;
        const pad = 20;

        ctx.clearRect(0, 0, w, h);
        ctx.strokeStyle = '#4ecca3';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(pad, h - pad);

        let points = [];
        const drawH = h - 2 * pad;
        const drawW = w - 2 * pad;

        if (envType === 'normal') {
            const a = parseFloat(document.getElementById('nA').value);
            const d = parseFloat(document.getElementById('nD').value);
            const s = parseFloat(document.getElementById('nS').value);
            const r = parseFloat(document.getElementById('nR').value);

            const total = (100 - a) + (100 - d) + 50 + (100 - r); 
            let x = pad;

            x += ((100 - a) / total) * drawW;
            points.push({x, y: pad});
            x += ((100 - d) / total) * drawW;
            points.push({x, y: h - pad - (s / 99) * drawH});
            x += (50 / total) * drawW;
            points.push({x, y: h - pad - (s / 99) * drawH});
            x += ((100 - r) / total) * drawW;
            points.push({x, y: h - pad});
        } else {
            const l = [
                parseFloat(document.getElementById('dL1').value),
                parseFloat(document.getElementById('dL2').value),
                parseFloat(document.getElementById('dL3').value),
                parseFloat(document.getElementById('dL4').value)
            ];
            const r = [
                parseFloat(document.getElementById('dR1').value),
                parseFloat(document.getElementById('dR2').value),
                parseFloat(document.getElementById('dR3').value),
                parseFloat(document.getElementById('dR4').value)
            ];
            const totalR = r.reduce((acc, val) => acc + (100 - val), 0) + 40;
            let x = pad;
            r.forEach((rate, i) => {
                x += ((100 - rate) / totalR) * drawW;
                points.push({x, y: h - pad - (l[i] / 99) * drawH});
                if (i === 2) {
                    x += (40 / totalR) * drawW;
                    points.push({x, y: h - pad - (l[i] / 99) * drawH});
                }
            });
        }

        points.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.stroke();

        ctx.fillStyle = '#fff';
        points.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    function drawOscilloscope() {
        const canvas = document.getElementById('visualizer');
        if (!canvas || !analyzer) return;
        const ctx = canvas.getContext('2d');
        const bufferLength = analyzer.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        function draw() {
            requestAnimationFrame(draw);
            analyzer.getByteTimeDomainData(dataArray);
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#4ecca3';
            ctx.beginPath();
            const sliceWidth = canvas.width / bufferLength;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * canvas.height / 2;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
        }
        draw();
    }

    function switchEnvelope(type) {
        envType = type;
        document.getElementById('btn-normal').classList.toggle('active', type === 'normal');
        document.getElementById('btn-dexed').classList.toggle('active', type === 'dexed');
        document.getElementById('env-normal').classList.toggle('hidden', type !== 'normal');
        document.getElementById('env-dexed').classList.toggle('hidden', type !== 'dexed');
        drawEnvelopePreview();
    }

    document.querySelectorAll('.env-param, #masterGain, #filterCutoff, #filterRes').forEach(el => {
        el.addEventListener('input', (e) => {
            const valSpan = e.target.nextElementSibling;
            if (valSpan && valSpan.classList.contains('value-display')) {
                valSpan.innerText = e.target.value;
            } else {
                const span = e.target.nextElementSibling;
                if (span) span.innerText = e.target.value;
            }
            drawEnvelopePreview();
        });
    });

    const playBtn = document.getElementById('playBtn');
    playBtn.addEventListener('mousedown', triggerNote);
    window.addEventListener('mouseup', () => stopNote(false));
    playBtn.addEventListener('touchstart', (e) => { e.preventDefault(); triggerNote(); });
    window.addEventListener('touchend', () => stopNote(false));

    window.onresize = () => {
        const visualizer = document.getElementById('visualizer');
        const envVisualizer = document.getElementById('envVisualizer');
        if (visualizer && visualizer.parentElement) {
            visualizer.width = visualizer.parentElement.clientWidth;
            visualizer.height = visualizer.parentElement.clientHeight;
        }
        if (envVisualizer && envVisualizer.parentElement) {
            envVisualizer.width = envVisualizer.parentElement.clientWidth;
            envVisualizer.height = envVisualizer.parentElement.clientHeight;
        }
        drawEnvelopePreview();
    };

    window.onload = () => {
        window.onresize();
        drawEnvelopePreview();
    };
</script>
</body>
</html>
