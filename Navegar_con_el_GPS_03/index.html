<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Navegar con GPS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <style>
        body, html { height: 100%; margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .ui-element { z-index: 1000; position: absolute; pointer-events: auto; }
        
        /* Icono de Usuario con Flecha */
        .user-icon-container { position: relative; }
        .user-arrow {
            width: 0; height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 18px solid #ef4444; /* Rojo para el usuario */
            position: absolute;
            top: -22px; left: -8px;
            transition: transform 0.1s linear;
        }
        .user-point {
            width: 14px; height: 14px;
            background: #ef4444;
            border: 2px solid white;
            border-radius: 50%;
        }

        /* Icono de Punto de Interés (Diferente al usuario) */
        .poi-icon {
            background: #3b82f6;
            width: 12px; height: 12px;
            border: 2px solid white;
            border-radius: 2px; /* Cuadrado para diferenciar */
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Botones de Acción -->
    <div class="ui-element top-4 left-4 right-4 flex flex-col gap-2 pointer-events-none">
        <div class="flex justify-between items-center pointer-events-auto">
            <h1 class="bg-white px-4 py-2 rounded-full shadow-lg font-bold text-gray-800 border">Navegar con GPS</h1>
            <button onclick="clearMap()" class="bg-red-500 text-white px-4 py-2 rounded-full shadow-lg font-bold flex items-center gap-2">
                <i class="fa-solid fa-trash-can"></i> Limpiar
            </button>
        </div>
    </div>

    <!-- Controles Inferiores -->
    <div class="ui-element bottom-8 left-4 right-4 flex flex-col gap-4 pointer-events-none">
        <div class="flex justify-between items-end pointer-events-auto">
            <div class="flex flex-col gap-2">
                <label class="bg-white w-12 h-12 rounded-full shadow-xl flex items-center justify-center cursor-pointer border">
                    <i class="fa-solid fa-file-import text-blue-600"></i>
                    <input type="file" id="fileInput" class="hidden" accept=".gpx,.kml,.json,.geojson">
                </label>
                <button onclick="centerOnUser()" class="bg-white w-12 h-12 rounded-full shadow-xl border flex items-center justify-center">
                    <i class="fa-solid fa-location-arrow text-blue-600"></i>
                </button>
            </div>
            <button onclick="exportData()" class="bg-blue-600 text-white w-14 h-14 rounded-2xl shadow-xl flex items-center justify-center">
                <i class="fa-solid fa-download"></i>
            </button>
        </div>

        <!-- Ficha de Destino -->
        <div id="infoCard" class="hidden glass-panel rounded-3xl p-5 shadow-2xl pointer-events-auto border">
            <h3 id="infoTitle" class="text-xl font-bold text-gray-900 mb-1">Nombre</h3>
            <p id="infoDesc" class="text-gray-600 text-sm mb-4">Descripción...</p>
            <button id="btnRoute" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2">
                <i class="fa-solid fa-route"></i> Trazar Ruta
            </button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>

    <script>
        let map, userMarker, userPos, heading = 0;
        let poiLayer = L.layerGroup();
        let routeLayer = L.layerGroup();
        let targetLatLng = null;

        // Iniciar Mapa
        function init() {
            map = L.map('map', { zoomControl: false }).setView([0,0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OSM'
            }).addTo(map);

            poiLayer.addTo(map);
            routeLayer.addTo(map);

            // GPS
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    userPos = [pos.coords.latitude, pos.coords.longitude];
                    const icon = L.divIcon({
                        className: 'user-icon-container',
                        html: `<div class="user-arrow" id="arrow"></div><div class="user-point"></div>`,
                        iconSize: [14, 14]
                    });

                    if (!userMarker) {
                        userMarker = L.marker(userPos, { icon }).addTo(map);
                        map.setView(userPos, 15);
                    } else {
                        userMarker.setLatLng(userPos);
                        updateArrow();
                    }
                }, null, { enableHighAccuracy: true });
            }

            // Brújula
            window.addEventListener('deviceorientation', e => {
                heading = e.webkitCompassHeading || (360 - e.alpha) || 0;
                updateArrow();
            });

            setupFile();
        }

        function updateArrow() {
            const el = document.getElementById('arrow');
            if (el) el.style.transform = `rotate(${heading}deg)`;
        }

        function setupFile() {
            document.getElementById('fileInput').onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const text = ev.target.result;
                    let data;
                    if (file.name.endsWith('.gpx') || file.name.endsWith('.kml')) {
                        const xml = new DOMParser().parseFromString(text, "text/xml");
                        data = file.name.endsWith('.gpx') ? toGeoJSON.gpx(xml) : toGeoJSON.kml(xml);
                    } else {
                        data = JSON.parse(text);
                    }
                    loadGeoJSON(data);
                };
                reader.readAsText(file);
            };
        }

        function loadGeoJSON(data) {
            poiLayer.clearLayers();
            L.geoJSON(data, {
                pointToLayer: (feat, ll) => L.marker(ll, {
                    icon: L.divIcon({ className: 'poi-icon' })
                }),
                onEachFeature: (feat, layer) => {
                    layer.on('click', () => {
                        targetLatLng = layer.getLatLng();
                        document.getElementById('infoTitle').innerText = feat.properties.name || "Punto";
                        document.getElementById('infoDesc').innerText = feat.properties.desc || feat.properties.description || "";
                        document.getElementById('infoCard').classList.remove('hidden');
                        document.getElementById('btnRoute').onclick = drawRoute;
                    });
                }
            }).addTo(poiLayer);
        }

        function drawRoute() {
            if (!userPos || !targetLatLng) return;
            routeLayer.clearLayers();
            
            // Usamos OSRM para obtener la geometría pero SIN mostrar el tiempo erróneo
            const url = `https://router.project-osrm.org/route/v1/foot/${userPos[1]},${userPos[0]};${targetLatLng.lng},${targetLatLng.lat}?overview=full&geometries=geojson`;
            
            fetch(url).then(r => r.json()).then(data => {
                if (data.routes && data.routes[0]) {
                    const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                    L.polyline(coords, { color: '#3b82f6', weight: 5, opacity: 0.7 }).addTo(routeLayer);
                    // No bloqueamos el zoom, permitimos que el usuario manipule el mapa
                    document.getElementById('infoCard').classList.add('hidden');
                }
            });
        }

        function clearMap() {
            poiLayer.clearLayers();
            routeLayer.clearLayers();
            document.getElementById('infoCard').classList.add('hidden');
        }

        function centerOnUser() {
            if (userPos) map.flyTo(userPos, 16);
        }

        function exportData() {
            const data = poiLayer.toGeoJSON();
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'export_gps.geojson';
            a.click();
        }

        window.onload = init;
    </script>
</body>
</html>
