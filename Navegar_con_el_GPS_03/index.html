<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoNavigator Pro - Mar del Plata</title>
    
    <!-- Dependencias -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .ui-overlay { z-index: 1000; position: absolute; pointer-events: none; }
        .ui-overlay * { pointer-events: auto; }
        
        /* Flecha de dirección (Compass) */
        .user-location-icon { position: relative; }
        .direction-arrow {
            width: 0; height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 22px solid #2563eb;
            position: absolute;
            top: -28px; left: -10px;
            transition: transform 0.1s ease-out;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
        }
        .user-dot {
            width: 16px; height: 16px;
            background: #2563eb;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
        }

        #loader {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            background: white;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        /* Estilo para los popups del mapa */
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 4px; }
        .leaflet-popup-tip { background: white; }
    </style>
</head>
<body class="bg-slate-50">

    <!-- Indicador de Carga -->
    <div id="loader" class="text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-blue-600 mx-auto mb-3"></div>
        <p class="text-slate-800 font-bold">Calculando ruta peatonal...</p>
    </div>

    <!-- UI: Cabecera -->
    <div class="ui-overlay top-4 left-4 right-4 flex flex-col gap-2">
        <div class="bg-white/95 backdrop-blur-md shadow-lg rounded-2xl p-4 flex items-center justify-between border border-white/40">
            <div>
                <h1 class="text-lg font-black text-slate-900 leading-tight">GeoNavigator <span class="text-blue-600">Pro</span></h1>
                <p class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">Exploración Mar del Plata</p>
            </div>
            <button onclick="requestPermission()" id="compassBtn" class="bg-blue-50 text-blue-700 px-4 py-1.5 rounded-full text-xs font-black border border-blue-100 hover:bg-blue-100 transition-colors">
                <i class="fa-solid fa-compass mr-1"></i> ACTIVAR BRÚJULA
            </button>
        </div>
    </div>

    <!-- UI: Panel de Acciones Inferiores -->
    <div class="ui-overlay bottom-8 left-4 right-4 flex flex-col gap-4">
        <div class="flex justify-between items-end">
            <div class="flex flex-col gap-3">
                <!-- Cargar Archivo -->
                <label class="bg-white w-14 h-14 rounded-2xl shadow-xl border border-slate-100 flex items-center justify-center cursor-pointer hover:bg-slate-50 active:scale-90 transition-all">
                    <i class="fa-solid fa-cloud-arrow-up text-blue-600 text-xl"></i>
                    <input type="file" id="fileInput" class="hidden" accept=".gpx,.kml,.json,.geojson">
                </label>
                <!-- Mi ubicación -->
                <button onclick="centerOnUser()" class="bg-white w-14 h-14 rounded-2xl shadow-xl border border-slate-100 flex items-center justify-center hover:bg-slate-50 active:scale-90 transition-all">
                    <i class="fa-solid fa-crosshairs text-blue-600 text-xl"></i>
                </button>
            </div>
            
            <!-- Descarga -->
            <button onclick="exportMapData()" class="bg-blue-600 text-white w-16 h-16 rounded-3xl shadow-2xl flex items-center justify-center hover:bg-blue-700 active:scale-95 transition-all">
                <i class="fa-solid fa-file-export text-2xl"></i>
            </button>
        </div>

        <!-- Tarjeta de Información de Destino -->
        <div id="destinationCard" class="hidden bg-white rounded-[2.5rem] p-6 shadow-2xl border border-slate-100 transition-all animate-in slide-in-from-bottom duration-300">
            <div class="flex justify-between items-start mb-2">
                <h3 id="destTitle" class="text-2xl font-black text-slate-900 pr-8">Nombre del Sitio</h3>
                <button onclick="closeDestination()" class="text-slate-300 hover:text-slate-500 transition-colors">
                    <i class="fa-solid fa-circle-xmark text-2xl"></i>
                </button>
            </div>
            
            <div id="destDist" class="text-blue-600 font-bold mb-4 flex items-center gap-1">
                <!-- Se llena dinámicamente -->
            </div>

            <p id="destDesc" class="text-slate-500 text-sm mb-6 leading-relaxed">Información detallada sobre este punto de interés.</p>
            
            <button id="routeBtn" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl flex items-center justify-center gap-3 active:scale-[0.98] transition-all">
                <i class="fa-solid fa-person-walking text-lg"></i> TRAZAR RUTA A PIE
            </button>
        </div>
    </div>

    <!-- Mapa -->
    <div id="map"></div>

    <!-- Scripts de Terceros -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>
    
    <script>
        let map, userMarker, userCircle;
        let heading = 0;
        let userPos = null;
        let pointsLayer = L.layerGroup();
        let routesLayer = L.layerGroup();
        let selectedTarget = null;

        // Inicializar Aplicación
        function init() {
            map = L.map('map', { zoomControl: false }).setView([-38.005, -57.545], 14);
            
            // Capa de mapa limpia y elegante
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            pointsLayer.addTo(map);
            routesLayer.addTo(map);

            startTracking();
            setupFileImport();
        }

        // Seguimiento GPS
        function startTracking() {
            if (!navigator.geolocation) return;

            navigator.geolocation.watchPosition(
                (pos) => {
                    const { latitude, longitude, accuracy } = pos.coords;
                    userPos = [latitude, longitude];

                    const icon = L.divIcon({
                        className: 'user-location-icon',
                        html: `<div class="direction-arrow" id="arrow"></div><div class="user-dot"></div>`,
                        iconSize: [16, 16],
                        iconAnchor: [8, 8]
                    });

                    if (!userMarker) {
                        userMarker = L.marker(userPos, { icon }).addTo(map);
                        userCircle = L.circle(userPos, { 
                            radius: accuracy, 
                            weight: 1, 
                            color: '#2563eb', 
                            fillOpacity: 0.05 
                        }).addTo(map);
                        centerOnUser();
                    } else {
                        userMarker.setLatLng(userPos);
                        userCircle.setLatLng(userPos).setRadius(accuracy);
                        updateArrowRotation();
                    }
                },
                (err) => console.error("GPS Error:", err),
                { enableHighAccuracy: true }
            );
        }

        // Brújula y Orientación
        function requestPermission() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response == 'granted') window.addEventListener('deviceorientation', handleOrientation);
                    });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
            document.getElementById('compassBtn').classList.add('hidden');
        }

        function handleOrientation(event) {
            if (event.webkitCompassHeading) {
                heading = event.webkitCompassHeading;
            } else if (event.alpha !== null) {
                heading = 360 - event.alpha;
            }
            updateArrowRotation();
        }

        function updateArrowRotation() {
            const arrow = document.getElementById('arrow');
            if (arrow) arrow.style.transform = `rotate(${heading}deg)`;
        }

        // Importación de Archivos
        function setupFileImport() {
            document.getElementById('fileInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const text = event.target.result;
                    let geojsonData;

                    try {
                        if (file.name.endsWith('.gpx')) {
                            const xml = new DOMParser().parseFromString(text, "text/xml");
                            geojsonData = toGeoJSON.gpx(xml);
                        } else if (file.name.endsWith('.kml')) {
                            const xml = new DOMParser().parseFromString(text, "text/xml");
                            geojsonData = toGeoJSON.kml(xml);
                        } else {
                            geojsonData = JSON.parse(text);
                        }
                        processGeoJSON(geojsonData);
                    } catch(err) {
                        alert("Error al procesar el archivo espacial.");
                    }
                };
                reader.readAsText(file);
            });
        }

        function processGeoJSON(data) {
            pointsLayer.clearLayers();
            const bounds = [];

            L.geoJSON(data, {
                pointToLayer: (feature, latlng) => {
                    return L.marker(latlng, {
                        icon: L.divIcon({
                            html: `<div class="bg-blue-600 w-4 h-4 rounded-full border-2 border-white shadow-lg"></div>`,
                            className: 'custom-pin',
                            iconSize: [16, 16]
                        })
                    });
                },
                onEachFeature: (feature, layer) => {
                    const name = feature.properties.name || "Punto de interés";
                    const desc = feature.properties.desc || feature.properties.description || "Sin descripción disponible.";
                    
                    layer.on('click', () => {
                        showDestination(name, desc, layer.getLatLng());
                    });

                    if (layer.getLatLng) bounds.push(layer.getLatLng());
                }
            }).addTo(pointsLayer);

            if (bounds.length > 0) map.fitBounds(bounds, { padding: [50, 50] });
        }

        // Cálculo de Rutas OSRM (Corrección de Tiempo Aplicada)
        async function calculateRoute() {
            if (!userPos || !selectedTarget) return;
            
            document.getElementById('loader').style.display = 'block';
            routesLayer.clearLayers();

            const start = `${userPos[1]},${userPos[0]}`;
            const end = `${selectedTarget.lng},${selectedTarget.lat}`;
            const url = `https://router.project-osrm.org/route/v1/foot/${start};${end}?overview=full&geometries=geojson`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.code !== 'Ok' || !data.routes.length) {
                    throw new Error("No se encontró una ruta peatonal viable.");
                }

                const route = data.routes[0];
                const latlngs = route.geometry.coordinates.map(c => [c[1], c[0]]);
                
                const polyline = L.polyline(latlngs, {
                    color: '#2563eb',
                    weight: 6,
                    opacity: 0.8,
                    dashArray: '2, 12',
                    lineCap: 'round'
                }).addTo(routesLayer);

                map.fitBounds(polyline.getBounds(), { padding: [80, 80] });

                // Formateo de Tiempo Humano
                const distanceKm = (route.distance / 1000).toFixed(2);
                const durationSeconds = route.duration;
                let timeString = "";

                if (durationSeconds < 60) {
                    timeString = "Menos de 1 min";
                } else if (durationSeconds < 3600) {
                    timeString = `${Math.ceil(durationSeconds / 60)} min`;
                } else {
                    const hours = Math.floor(durationSeconds / 3600);
                    const mins = Math.round((durationSeconds % 3600) / 60);
                    timeString = `${hours} h ${mins} min`;
                }

                document.getElementById('destDist').innerHTML = `
                    <i class="fa-solid fa-person-walking"></i> ${distanceKm} km
                    <span class="mx-2 opacity-30">|</span>
                    <i class="fa-solid fa-clock"></i> ${timeString}
                `;

            } catch (err) {
                alert("Error de navegación: " + err.message);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        // Interfaz
        function showDestination(name, desc, latlng) {
            selectedTarget = latlng;
            document.getElementById('destTitle').textContent = name;
            document.getElementById('destDesc').textContent = desc;
            document.getElementById('destDist').innerHTML = `<i class="fa-solid fa-map-pin"></i> Destino seleccionado`;
            document.getElementById('destinationCard').classList.remove('hidden');
            document.getElementById('routeBtn').onclick = calculateRoute;
        }

        function closeDestination() {
            document.getElementById('destinationCard').classList.add('hidden');
            routesLayer.clearLayers();
            selectedTarget = null;
        }

        function centerOnUser() {
            if (userPos) map.flyTo(userPos, 16);
        }

        function exportMapData() {
            const data = pointsLayer.toGeoJSON();
            routesLayer.eachLayer(layer => {
                data.features.push(layer.toGeoJSON());
            });

            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'recorrido_mar_del_plata.geojson';
            a.click();
        }

        window.onload = init;
    </script>
</body>
</html>
