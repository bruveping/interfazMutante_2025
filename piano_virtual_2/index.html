<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Piano Virtual Pro</title>
    
    <!-- Favicon dinámico con Emoji de Piano -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎹</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --white-key-height: 250px;
            --black-key-height: 150px;
        }
        body {
            touch-action: none; 
            background-color: #121212;
            color: #e4e4e7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }
        .controls-panel {
            background: #1f1f23;
            border-bottom: 1px solid #333;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            z-index: 10;
        }
        .piano-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: flex-end;
            padding-bottom: 20px;
            width: 100%;
            overflow: hidden;
        }
        .piano-container {
            display: flex;
            width: 100%;
            height: var(--white-key-height);
            position: relative;
        }
        .key {
            flex: 1; 
            border: 1px solid #1a1a1a;
            cursor: pointer;
            user-select: none;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
            font-size: 0.7rem;
            font-weight: bold;
            transition: transform 0.05s, background 0.05s;
        }
        .white-key {
            background: linear-gradient(to bottom, #eee 0%, #fff 100%);
            color: #555;
            z-index: 1;
            border-radius: 0 0 5px 5px;
        }
        .black-key {
            background: linear-gradient(to bottom, #444 0%, #000 100%);
            color: #fff;
            height: var(--black-key-height);
            z-index: 2;
            margin-left: -2.5%; 
            margin-right: -2.5%;
            width: 5%; 
            min-width: 20px;
            border-radius: 0 0 3px 3px;
        }
        .key.active {
            background: #10b981 !important;
            color: white;
            transform: translateY(2px);
        }
        .octave-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-nav {
            background: #3f3f46;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-nav:active { background: #10b981; }
        input[type="number"] {
            background: #27272a;
            border: 1px solid #3f3f46;
            color: white;
            text-align: center;
            width: 50px;
            padding: 4px;
            border-radius: 4px;
        }
        input[type="range"] { accent-color: #10b981; width: 100%; }
        label { pointer-events: none; }
    </style>
</head>
<body>

    <!-- Panel de Controles Superior -->
    <div class="controls-panel">
        <div class="flex flex-col gap-1">
            <label class="text-xs uppercase tracking-wider text-zinc-400">Volumen</label>
            <input type="range" id="masterVolume" min="0" max="2" step="0.05" value="0.2">
        </div>

        <div class="flex flex-col gap-1">
            <label class="text-xs uppercase tracking-wider text-zinc-400">Octava (C0 - C10)</label>
            <div class="octave-selector">
                <button class="btn-nav" onclick="changeOctave(-1)">-</button>
                <input type="number" id="octaveInput" value="4" min="0" max="10" readonly>
                <button class="btn-nav" onclick="changeOctave(1)">+</button>
            </div>
        </div>

        <div class="flex flex-col gap-1">
            <label class="text-xs uppercase tracking-wider text-zinc-400">Primera Nota</label>
            <select id="startNote" class="bg-zinc-800 border border-zinc-700 text-white text-xs p-2 rounded">
                <option value="0">C (Do)</option>
                <option value="1">C#</option>
                <option value="2">D (Re)</option>
                <option value="3">D#</option>
                <option value="4">E (Mi)</option>
                <option value="5">F (Fa)</option>
                <option value="6">F#</option>
                <option value="7">G (Sol)</option>
                <option value="8">G#</option>
                <option value="9">A (La)</option>
                <option value="10">A#</option>
                <option value="11">B (Si)</option>
            </select>
        </div>
    </div>

    <!-- Panel ADSR -->
    <div class="controls-panel text-[10px]">
        <div class="flex flex-col">
            <label class="text-zinc-500 uppercase">Ataque</label>
            <input type="range" id="attack" min="0.01" max="1" step="0.01" value="0.02">
        </div>
        <div class="flex flex-col">
            <label class="text-zinc-500 uppercase">Decaimiento</label>
            <input type="range" id="decay" min="0.05" max="1" step="0.01" value="0.15">
        </div>
        <div class="flex flex-col">
            <label class="text-zinc-500 uppercase">Sostenido</label>
            <input type="range" id="sustain" min="0" max="1" step="0.01" value="0.4">
        </div>
        <div class="flex flex-col">
            <label class="text-zinc-500 uppercase">Relajación</label>
            <input type="range" id="release" min="0.1" max="3" step="0.01" value="0.6">
        </div>
    </div>

    <!-- Contenedor del Teclado -->
    <div class="piano-wrapper">
        <div id="piano" class="piano-container"></div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const activeVoices = new Map();

        const notesMap = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const pianoElement = document.getElementById('piano');

        const octaveInput = document.getElementById('octaveInput');
        const startNoteSelect = document.getElementById('startNote');
        const masterVolInput = document.getElementById('masterVolume');
        
        const adsr = {
            attack: document.getElementById('attack'),
            decay: document.getElementById('decay'),
            sustain: document.getElementById('sustain'),
            release: document.getElementById('release')
        };

        // Forzar valor inicial de volumen al cargar
        window.addEventListener('DOMContentLoaded', () => {
            masterVolInput.value = 0.2;
            renderPiano();
        });

        function changeOctave(val) {
            let current = parseInt(octaveInput.value);
            let next = current + val;
            if (next >= 0 && next <= 10) {
                octaveInput.value = next;
                renderPiano();
            }
        }

        startNoteSelect.onchange = () => renderPiano();

        function createKey(noteName, octave, isBlack) {
            const key = document.createElement('div');
            key.className = `key ${isBlack ? 'black-key' : 'white-key'}`;
            if (!isBlack) key.innerText = `${noteName}${octave}`;

            const handleStart = (e) => {
                e.preventDefault();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const freq = getFrequency(noteName, octave);
                playNote(freq, noteName + octave);
                key.classList.add('active');
            };

            const handleEnd = (e) => {
                e.preventDefault();
                stopNote(noteName + octave);
                key.classList.remove('active');
            };

            // Eventos Mouse
            key.addEventListener('mousedown', handleStart);
            key.addEventListener('mouseup', handleEnd);
            key.addEventListener('mouseleave', handleEnd);
            
            // Eventos Touch (Multitouch soportado)
            key.addEventListener('touchstart', handleStart, {passive: false});
            key.addEventListener('touchend', handleEnd, {passive: false});

            return key;
        }

        function renderPiano() {
            pianoElement.innerHTML = '';
            const baseOct = parseInt(octaveInput.value);
            const startIdx = parseInt(startNoteSelect.value);
            
            for (let i = 0; i < 25; i++) {
                const absoluteIdx = startIdx + i;
                const noteIdx = absoluteIdx % 12;
                const octaveOffset = Math.floor(absoluteIdx / 12);
                const noteName = notesMap[noteIdx];
                const isBlack = noteName.includes('#');
                
                pianoElement.appendChild(createKey(noteName, baseOct + octaveOffset, isBlack));
            }
        }

        function getFrequency(note, octave) {
            const notes = {'C': 0, 'C#': 1, 'D': 2, 'D#': 3, 'E': 4, 'F': 5, 'F#': 6, 'G': 7, 'G#': 8, 'A': 9, 'A#': 10, 'B': 11};
            const h = notes[note] + (octave - 4) * 12;
            return 440 * Math.pow(2, (h - 9) / 12);
        }

        function playNote(frequency, keyId) {
            const osc = audioCtx.createOscillator();
            const subOsc = audioCtx.createOscillator(); 
            const gainNode = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            
            subOsc.type = 'sine';
            subOsc.frequency.setValueAtTime(frequency * 2, audioCtx.currentTime);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(frequency * 4, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(frequency * 1.5, audioCtx.currentTime + 0.5);

            const now = audioCtx.currentTime;
            const atk = parseFloat(adsr.attack.value);
            const dec = parseFloat(adsr.decay.value);
            const sus = parseFloat(adsr.sustain.value);
            const master = parseFloat(masterVolInput.value);

            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(master, now + atk);
            gainNode.gain.exponentialRampToValueAtTime(master * sus + 0.001, now + atk + dec);

            osc.connect(filter);
            subOsc.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            subOsc.start();

            activeVoices.set(keyId, { osc, subOsc, gainNode });
        }

        function stopNote(keyId) {
            const voice = activeVoices.get(keyId);
            if (voice) {
                const now = audioCtx.currentTime;
                const rel = parseFloat(adsr.release.value);
                
                voice.gainNode.gain.cancelScheduledValues(now);
                voice.gainNode.gain.setValueAtTime(voice.gainNode.gain.value, now);
                voice.gainNode.gain.exponentialRampToValueAtTime(0.0001, now + rel);
                
                voice.osc.stop(now + rel + 0.1);
                voice.subOsc.stop(now + rel + 0.1);
                activeVoices.delete(keyId);
            }
        }

        window.addEventListener('resize', renderPiano);
    </script>
</body>
</html>
