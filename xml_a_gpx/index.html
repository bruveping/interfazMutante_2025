<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX to Map Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-3xl bg-gray-800 rounded-3xl shadow-2xl p-6 md:p-10 border border-gray-700">
        <h1 class="text-3xl font-extrabold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
            Exportador de Mapas
        </h1>
        <p class="text-gray-400 mb-8">Pega el código XML del GPX para generar tus archivos de navegación.</p>

        <textarea 
            id="xmlInput" 
            class="w-full h-80 bg-gray-950 text-emerald-500 font-mono text-sm p-4 rounded-2xl border border-gray-700 focus:ring-2 focus:ring-blue-500 focus:outline-none mb-6 resize-none"
            placeholder="Pega aquí el contenido del GPX..."
        ></textarea>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <button onclick="download('gpx')" class="bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition-all transform active:scale-95">Descargar GPX</button>
            <button onclick="download('kml')" class="bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold transition-all transform active:scale-95">Descargar KML</button>
            <button onclick="download('json')" class="bg-amber-600 hover:bg-amber-500 py-3 rounded-xl font-bold transition-all transform active:scale-95">Descargar GeoJSON</button>
        </div>

        <div id="msg" class="mt-6 text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        function download(type) {
            const content = document.getElementById('xmlInput').value.trim();
            if(!content) {
                alert("El campo está vacío");
                return;
            }

            let finalContent = content;
            let mimeType = "application/xml";
            let fileName = `mapa_mdp.${type}`;

            if (type === 'kml') {
                finalContent = convertToKML(content);
                mimeType = "application/vnd.google-earth.kml+xml";
            } else if (type === 'json') {
                finalContent = convertToGeoJSON(content);
                mimeType = "application/json";
            }

            const blob = new Blob([finalContent], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(url);
        }

        function convertToKML(xml) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xml, "text/xml");
            const wpts = doc.getElementsByTagName("wpt");
            let kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>Puntos Mar del Plata</name>`;
            for (let w of wpts) {
                kml += `<Placemark><name>${w.querySelector("name")?.textContent}</name><description>${w.querySelector("desc")?.textContent}</description><Point><coordinates>${w.getAttribute("lon")},${w.getAttribute("lat")},0</coordinates></Point></Placemark>`;
            }
            return kml + `</Document></kml>`;
        }

        function convertToGeoJSON(xml) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xml, "text/xml");
            const wpts = doc.getElementsByTagName("wpt");
            const features = Array.from(wpts).map(w => ({
                type: "Feature",
                geometry: { type: "Point", coordinates: [parseFloat(w.getAttribute("lon")), parseFloat(w.getAttribute("lat"))] },
                properties: { name: w.querySelector("name")?.textContent, description: w.querySelector("desc")?.textContent }
            }));
            return JSON.stringify({ type: "FeatureCollection", features }, null, 2);
        }
    </script>
</body>
</html>
