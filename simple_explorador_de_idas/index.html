<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Explorador de Ideas Rápidas</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --text: #1e293b;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            font-family: system-ui, -apple-system, sans-serif; 
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        header {
            padding: 0.75rem 1rem;
            background: white;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        h1 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .instruction {
            margin: 0.25rem 0 0 0;
            font-size: 0.75rem;
            color: #64748b;
            display: none; /* Oculto en móviles para ahorrar espacio */
        }

        @media (min-width: 768px) {
            h1 { font-size: 1.25rem; }
            .instruction { display: block; }
            header { padding: 1rem 1.5rem; }
        }

        #main-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
        }

        #editor-area {
            height: 35%;
            padding: 10px;
            background: white;
            position: relative;
            border-bottom: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        @media (min-width: 768px) {
            #editor-area { height: 40%; padding: 15px; border-bottom-width: 4px; }
        }

        textarea {
            flex-grow: 1;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-family: 'Fira Code', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
            color: #334155;
            transition: border-color 0.2s;
        }

        textarea.error-border {
            border-color: var(--warning);
        }

        #error-console {
            background: #fffbeb;
            border: 1px solid #fde68a;
            color: #92400e;
            padding: 8px 30px 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            display: none;
            position: relative;
        }

        #close-error {
            position: absolute;
            right: 8px;
            top: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            color: #b45309;
        }

        .show-error { display: block !important; }

        #viewer-area {
            flex-grow: 1;
            background: white;
            position: relative;
            cursor: grab;
            overflow: hidden;
            touch-action: none; /* Vital para gestos D3 en móvil */
        }

        #viewer-area:active { cursor: grabbing; }

        #canvas {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-origin: center center;
        }

        .mermaid {
            display: none !important;
        }

        #canvas svg {
            margin: auto;
            display: block;
            max-width: none !important;
        }

        .controls {
            position: absolute;
            bottom: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        button {
            padding: 12px 16px;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }

        @media (min-width: 768px) {
            .controls { flex-direction: row; bottom: 20px; right: 20px; }
            button { border-radius: 8px; padding: 10px 18px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<header>
    <h1>Explorador de Ideas</h1>
    <p class="instruction">
        Usa <b>Enter</b> para nuevos nodos y <b>Tab</b> para sub-ideas. Evita usar: ( ) [ ] { } &
    </p>
</header>

<div id="main-container">
    <div id="editor-area">
        <textarea id="editor" spellcheck="false" placeholder="Escribe tu idea principal aquí...">Mi Proyecto Principal
    Fase de Diseño
        Investigación
        Prototipado
    Fase de Desarrollo
        Configuración
        Programación
    Fase de Pruebas
        Testing
        Lanzamiento</textarea>
        
        <div id="error-console">
            <span id="close-error">×</span>
            💡 <b>Nota:</b> Revisa las tabulaciones y evita caracteres especiales como ( ) [ ] { }.
        </div>
    </div>

    <div id="viewer-area">
        <div id="canvas">
            <!-- Mermaid SVG -->
        </div>
        <div class="controls">
            <button onclick="resetView()">Centrar</button>
        </div>
    </div>
</div>

<script>
    mermaid.initialize({
        startOnLoad: false,
        theme: 'default',
        securityLevel: 'loose',
        suppressErrorRendering: true,
        mindmap: {
            useMaxWidth: false
        }
    });

    const editor = document.getElementById('editor');
    const canvasDiv = document.getElementById('canvas');
    const errorConsole = document.getElementById('error-console');
    const closeError = document.getElementById('close-error');
    const viewerArea = d3.select("#viewer-area");
    const canvasSelection = d3.select("#canvas");

    let isErrorDismissed = false;

    // Zoom D3 con soporte táctil
    const zoomHandler = d3.zoom()
        .scaleExtent([0.1, 5])
        .on("zoom", (e) => {
            canvasSelection.style("transform", `translate(${e.transform.x}px, ${e.transform.y}px) scale(${e.transform.k})`);
        });

    viewerArea.call(zoomHandler);

    function resetView() {
        viewerArea.transition().duration(750).call(
            zoomHandler.transform,
            d3.zoomIdentity.translate(0, 0).scale(1)
        );
    }

    closeError.onclick = () => {
        errorConsole.classList.remove('show-error');
        isErrorDismissed = true;
    };

    function sanitize(text) {
        return text.replace(/[()\[\]{}&]/g, "").trim();
    }

    function buildMermaidCode(val) {
        const lines = val.split('\n').filter(l => l.trim() !== "");
        if (lines.length === 0) return "";

        let code = "mindmap\n";
        lines.forEach((line, index) => {
            const cleanText = sanitize(line);
            if (!cleanText) return;

            const leadingWhitespace = line.match(/^[\s\t]*/)[0];
            const level = leadingWhitespace.replace(/\t/g, "    ").length;

            if (index === 0) {
                code += `    root((${cleanText}))\n`;
            } else {
                code += `${" ".repeat(level + 4)}${cleanText}\n`;
            }
        });
        return code;
    }

    let renderDebounce;
    async function render() {
        const code = buildMermaidCode(editor.value);
        if (!code) {
            canvasDiv.innerHTML = "";
            return;
        }

        try {
            await mermaid.parse(code);
            const { svg } = await mermaid.render('mermaid-svg-' + Date.now(), code);
            
            canvasDiv.innerHTML = svg;
            errorConsole.classList.remove('show-error');
            editor.classList.remove('error-border');
            isErrorDismissed = false;
        } catch (err) {
            if (!isErrorDismissed) {
                errorConsole.classList.add('show-error');
            }
            editor.classList.add('error-border');
        }
    }

    editor.addEventListener('input', () => {
        clearTimeout(renderDebounce);
        renderDebounce = setTimeout(render, 300);
    });

    // Soporte para Tab en navegadores móviles (aunque es más difícil de activar)
    editor.addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
            e.preventDefault();
            const start = this.selectionStart;
            const end = this.selectionEnd;
            this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
            this.selectionStart = this.selectionEnd = start + 4;
            render();
        }
    });

    window.addEventListener('load', () => {
        render();
        setTimeout(resetView, 600);
    });

    // Re-centrar al cambiar orientación del móvil
    window.addEventListener('resize', resetView);
</script>

</body>
</html>
